name: Deploy to Render on Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "⚠️ Render not configured. Setup steps:"
            echo "1. Create service at https://render.com"
            echo "2. Get Service ID from dashboard"
            echo "3. Get API key from Render account"
            echo "4. Add RENDER_API_KEY and RENDER_SERVICE_ID as GitHub secrets"
          else
            curl -X POST "https://api.render.com/deploy/$RENDER_SERVICE_ID?key=$RENDER_API_KEY"
            echo "✅ Deployment to Render triggered!"
          fi
