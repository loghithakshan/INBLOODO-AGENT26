name: Deploy to Railway on Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up
        if: env.RAILWAY_TOKEN != ''
      
      - name: Notify Success
        if: success()
        run: echo "✅ Deployment to Railway successful!"
      
      - name: Notify Setup Needed
        if: failure()
        run: |
          echo "⚠️ Railway deployment not configured"
          echo "To enable auto-deployment:"
          echo "1. Get Railway API token from https://railway.app/account/tokens"
          echo "2. Add it as GitHub secret: RAILWAY_TOKEN"
          echo "3. Push to main to trigger deployment"
